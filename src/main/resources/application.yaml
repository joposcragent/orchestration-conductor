server:
  port: 8084

spring:
  application:
    name: orchestration-conductor
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

joposcragent:
  settings-manager:
    base-url: http://localhost:8080

app:
  kafka:
    batch-consumer-group: orchestration-conductor.collection-batch
    create-result-consumer-group: orchestration-conductor.job-posting-create-result

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Uncomment for verbose service logs (REST + Kafka payloads):
# logging:
#   level:
#     ru.sadovskie.leo.app.joposcragent.orchestrationconductor: DEBUG
